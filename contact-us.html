        <div class="w-full">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="border p-6 rounded-lg border-green-500">
              <form
                method="post"
                action="api/web-lead-submission.php"
                id="contact_form"
              >
                <div class="mb-3">
                  <label for="">Name</label>
                  <input
                    type="text"
                    placeholder="Enter Name"
                    name="name"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="">Email</label>
                  <input
                    type="email"
                    placeholder="Enter Email"
                    name="email"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="">Mob No.</label>
                  <input
                    type="tel"
                    pattern="\+[0-9]{1,3}\s[0-9]{10}"
                    placeholder="+91 xxxxxxxxxx"
                    required
                    name="mobile"
                  />
                </div>
                <div class="mb-3">
                  <label for="">Message</label>
                  <textarea
                    placeholder="Enter Message"
                    name="message"
                  ></textarea>
                </div>
